<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Multiview</title>
    <!-- Include HLS.js to play m3u8 files in the browser -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Toolbar for the hide/show button */
        #toolbar {
            background-color: #222;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #444;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 3x3 Grid Layout */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            padding: 5px;
            flex-grow: 1;
            box-sizing: border-box;
        }

        .video-wrapper {
            position: relative;
            background-color: #000;
            width: 100%;
            height: 100%;
            border: 1px solid #333;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Camera Labels */
        .cam-label {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through to video */
            transition: opacity 0.3s;
        }

        /* Class used to hide labels */
        .hidden {
            opacity: 0 !important;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <button id="toggle-labels-btn" onclick="toggleLabels()">Hide Labels</button>
    </div>

    <div id="grid-container">
        <!-- Videos will be injected here by JavaScript -->
    </div>

    <script>
        // Your list of streams and their labels
        const streams = [
            { name: "KENT", url: "https://s69.ipcamlive.com/streams/45gclvvpjytradw6h/stream.m3u8" },
            { name: "WALLINGFORD", url: "https://s28.ipcamlive.com/streams/1ch8gypljnfovjusq/stream.m3u8" },
            { name: "BROADWAY", url: "https://s37.ipcamlive.com/streams/25unvk3tfdi2jg4a6/stream.m3u8" },
            { name: "HOLMAN ROAD", url: "https://s37.ipcamlive.com/streams/25f8g4i2hjxrjdq1g/stream.m3u8" },
            { name: "LAKE CITY", url: "https://s67.ipcamlive.com/streams/43wljjyd5921hvtqo/stream.m3u8" },
            { name: "QUEENE ANNE", url: "https://s109.ipcamlive.com/streams/6dg9kqdny1u3vthrp/stream.m3u8" },
            { name: "EDMONDS", url: "https://s60.ipcamlive.com/streams/3c2ncaelbxoj4bhzr/stream.m3u8" },
            { name: "CROSSROADS", url: "https://s37.ipcamlive.com/streams/25k9m1jyanmtflign/stream.m3u8" },
            { name: "EVERETT", url: "https://s73.ipcamlive.com/streams/49swte6mw2vo0uin9/stream.m3u8" }
        ];

        const gridContainer = document.getElementById('grid-container');

        // Setup the grid and initialize video players
        streams.forEach((stream, index) => {
            // Create wrapper
            const wrapper = document.createElement('div');
            wrapper.className = 'video-wrapper';

            // Create video element
            const video = document.createElement('video');
            video.id = `video-${index}`;
            video.muted = true; // Must be muted to allow autoplay in web browsers
            video.autoplay = true;
            video.playsInline = true;

            // Create label
            const label = document.createElement('div');
            label.className = 'cam-label';
            label.innerText = stream.name;

            wrapper.appendChild(video);
            wrapper.appendChild(label);
            gridContainer.appendChild(wrapper);

            // Attach HLS.js to play the m3u8 file
            if (Hls.isSupported()) {
                const hls = new Hls({
                    lowLatencyMode: true,
                });
                hls.loadSource(stream.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    video.play().catch(e => console.log("Autoplay blocked", e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari / iOS native support
                video.src = stream.url;
                video.addEventListener('loadedmetadata', function () {
                    video.play();
                });
            }
        });

        // Function to toggle labels on and off
        let labelsVisible = true;
        function toggleLabels() {
            const labels = document.querySelectorAll('.cam-label');
            const btn = document.getElementById('toggle-labels-btn');
            
            labelsVisible = !labelsVisible;
            
            labels.forEach(label => {
                if (labelsVisible) {
                    label.classList.remove('hidden');
                } else {
                    label.classList.add('hidden');
                }
            });

            btn.innerText = labelsVisible ? "Hide Labels" : "Show Labels";
        }
    </script>

</body>
</html>
